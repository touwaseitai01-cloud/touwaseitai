  </defs>

  <circle cx="70" cy="72" r="60" fill="url(#tw-swh-halo)"/>
  <ellipse cx="70" cy="72" rx="58" ry="21" fill="none" stroke="url(#tw-swh-orbit)" stroke-opacity=".65" stroke-width="1.8" transform="rotate(-24 70 72)"/>
  <use href="#tw-swh-sweater" fill="url(#tw-swh-fill)"/>
  <rect x="14" y="33" width="112" height="82" fill="url(#tw-swh-knit)" clip-path="url(#tw-swh-clip)"/>
  <g clip-path="url(#tw-swh-clip)" stroke="#cdeeff" stroke-opacity=".55" stroke-width="1">
    <line x1="49" y1="104" x2="49" y2="112"/><line x1="55" y1="104" x2="55" y2="112"/>
    <line x1="61" y1="104" x2="61" y2="112"/><line x1="67" y1="104" x2="67" y2="112"/>
    <line x1="73" y1="104" x2="73" y2="112"/><line x1="79" y1="104" x2="79" y2="112"/>
    <line x1="85" y1="104" x2="85" y2="112"/><line x1="91" y1="104" x2="91" y2="112"/>
  </g>
  <use href="#tw-swh-sweater" fill="none" stroke="#bfe9ff" stroke-opacity=".8" stroke-width="1.3" stroke-linejoin="round"/>

  <text x="150" y="58" font-family="'Cormorant Garamond', serif" font-weight="600" font-size="34" fill="url(#tw-swh-text)" letter-spacing="7">TOUWASEITAI</text>
