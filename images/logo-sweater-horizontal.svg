<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140" width="500" height="140" role="img" aria-label="TOUWASEITAI 東和盛泰株式会社 KNITWEAR OEM ロゴ">
  <defs>
    <radialGradient id="tw-swh-fill" cx="42%" cy="30%" r="80%">
      <stop offset="0" stop-color="#7fe0ff"/>
      <stop offset=".4" stop-color="#2b8bf0"/>
      <stop offset=".8" stop-color="#1745b8"/>
      <stop offset="1" stop-color="#101a5c"/>
    </radialGradient>
    <radialGradient id="tw-swh-halo" cx="50%" cy="48%" r="50%">
      <stop offset=".5" stop-color="#5ec8ff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#5ec8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tw-swh-orbit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9be8ff"/>
      <stop offset="1" stop-color="#3a7bff"/>
    </linearGradient>
    <linearGradient id="tw-swh-text" x1="0" y1="0" x2="1" y2="0">
