    </linearGradient>
    <pattern id="tw-swh-knit" width="9" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 1 L4.5 7 L9 1" fill="none" stroke="#eafaff" stroke-opacity=".5" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </pattern>
    <path id="tw-swh-sweater" d="M80 35 Q70 43 60 35 C54 33 49 35 44 41 L26 48 L17 90 Q15 96 21 97 L34 97 Q40 97 41 91 L47 65 L45 112 L95 112 L93 65 L99 91 Q100 97 106 97 L119 97 Q125 96 123 90 L114 48 L96 41 C91 35 86 33 80 35 Z"/>
