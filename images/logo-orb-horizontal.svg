<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 510 140" width="510" height="140" role="img" aria-label="TOUWASEITAI 東和盛泰株式会社 KNITWEAR OEM ロゴ">
  <defs>
    <radialGradient id="tw-oh-fill" cx="40%" cy="34%" r="75%">
      <stop offset="0" stop-color="#7fe0ff"/>
      <stop offset=".4" stop-color="#2b8bf0"/>
      <stop offset=".8" stop-color="#1745b8"/>
      <stop offset="1" stop-color="#101a5c"/>
    </radialGradient>
    <radialGradient id="tw-oh-halo" cx="50%" cy="50%" r="50%">
      <stop offset=".55" stop-color="#5ec8ff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#5ec8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tw-oh-orbit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9be8ff"/>
      <stop offset="1" stop-color="#3a7bff"/>
    </linearGradient>
    <linearGradient id="tw-oh-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0e63d6"/>
      <stop offset="1" stop-color="#3aa0ff"/>
    </linearGradient>
    <pattern id="tw-oh-knit" width="8" height="7" patternUnits="userSpaceOnUse">
      <path d="M0 1 L4 6 L8 1" fill="none" stroke="#eafaff" stroke-opacity=".55" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
    </pattern>
    <clipPath id="tw-oh-clip"><circle cx="70" cy="70" r="34"/></clipPath>
  </defs>

  <circle cx="70" cy="70" r="56" fill="url(#tw-oh-halo)"/>
  <circle cx="70" cy="70" r="34" fill="url(#tw-oh-fill)"/>
  <rect x="34" y="34" width="72" height="72" fill="url(#tw-oh-knit)" clip-path="url(#tw-oh-clip)"/>
  <path d="M54 48 A34 34 0 0 0 51 92" fill="none" stroke="#eafaff" stroke-opacity=".55" stroke-width="2.1" stroke-linecap="round"/>
  <ellipse cx="70" cy="70" rx="52" ry="19" fill="none" stroke="url(#tw-oh-orbit)" stroke-width="2" transform="rotate(-26 70 70)"/>
  <circle cx="118" cy="48" r="2.8" fill="#9be8ff"/>
  <g fill="#bcdcff" fill-opacity=".9">
    <circle cx="28" cy="40" r="1.3"/>
    <circle cx="40" cy="108" r="1.5"/>
  </g>

  <text x="138" y="58" font-family="'Cormorant Garamond', serif" font-weight="600" font-size="34" fill="url(#tw-oh-text)" letter-spacing="7">TOUWASEITAI</text>
  <text x="140" y="83" font-family="'Noto Sans JP', sans-serif" font-weight="500" font-size="14" fill="#5d7185" letter-spacing="6">東和盛泰株式会社</text>
  <text x="140" y="104" font-family="'Noto Sans JP', sans-serif" font-weight="700" font-size="10.5" fill="#3aa0ff" letter-spacing="5">KNITWEAR OEM ／ ニットOEM</text>
</svg>
