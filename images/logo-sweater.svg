<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140" role="img" aria-label="東和盛泰 ニットセーターマーク">
  <defs>
    <radialGradient id="tw-sw-fill" cx="42%" cy="30%" r="80%">
      <stop offset="0" stop-color="#7fe0ff"/>
      <stop offset=".4" stop-color="#2b8bf0"/>
      <stop offset=".8" stop-color="#1745b8"/>
      <stop offset="1" stop-color="#101a5c"/>
    </radialGradient>
    <radialGradient id="tw-sw-halo" cx="50%" cy="48%" r="50%">
      <stop offset=".5" stop-color="#5ec8ff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#5ec8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tw-sw-orbit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9be8ff"/>
      <stop offset="1" stop-color="#3a7bff"/>
    </linearGradient>
    <pattern id="tw-sw-knit" width="9" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 1 L4.5 7 L9 1" fill="none" stroke="#eafaff" stroke-opacity=".5" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </pattern>
    <path id="tw-sweater" d="M80 35 Q70 43 60 35 C54 33 49 35 44 41 L26 48 L17 90 Q15 96 21 97 L34 97 Q40 97 41 91 L47 65 L45 112 L95 112 L93 65 L99 91 Q100 97 106 97 L119 97 Q125 96 123 90 L114 48 L96 41 C91 35 86 33 80 35 Z"/>
    <clipPath id="tw-sw-clip"><use href="#tw-sweater"/></clipPath>
  </defs>

  <!-- 発光ハロー -->
  <circle cx="70" cy="72" r="64" fill="url(#tw-sw-halo)"/>

  <!-- 背景の軌道リング（神秘・グローバル） -->
  <ellipse cx="70" cy="72" rx="60" ry="22" fill="none" stroke="url(#tw-sw-orbit)" stroke-opacity=".7" stroke-width="2" transform="rotate(-24 70 72)"/>

  <!-- セーター本体 -->
  <use href="#tw-sweater" fill="url(#tw-sw-fill)"/>

  <!-- 編み目（Vステッチ）テクスチャ -->
  <rect x="14" y="33" width="112" height="82" fill="url(#tw-sw-knit)" clip-path="url(#tw-sw-clip)"/>

  <!-- リブ（裾・袖口）の縦リブ -->
  <g clip-path="url(#tw-sw-clip)" stroke="#cdeeff" stroke-opacity=".55" stroke-width="1.1">
    <line x1="49" y1="104" x2="49" y2="112"/><line x1="55" y1="104" x2="55" y2="112"/>
    <line x1="61" y1="104" x2="61" y2="112"/><line x1="67" y1="104" x2="67" y2="112"/>
    <line x1="73" y1="104" x2="73" y2="112"/><line x1="79" y1="104" x2="79" y2="112"/>
    <line x1="85" y1="104" x2="85" y2="112"/><line x1="91" y1="104" x2="91" y2="112"/>
  </g>

  <!-- 輪郭の発光エッジ -->
  <use href="#tw-sweater" fill="none" stroke="#bfe9ff" stroke-opacity=".8" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- 星 -->
  <g fill="#dff4ff">
    <circle cx="20" cy="30" r="1.6"/>
    <circle cx="120" cy="38" r="2"/>
    <circle cx="115" cy="112" r="1.5"/>
    <circle cx="26" cy="116" r="1.3"/>
  </g>
</svg>
