<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="東和盛泰 毛糸玉マーク">
  <defs>
    <linearGradient id="tw-yarn-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ec8ff"/>
      <stop offset=".55" stop-color="#2e9bf0"/>
      <stop offset="1" stop-color="#1f7fe0"/>
    </linearGradient>
    <clipPath id="tw-ball"><circle cx="60" cy="62" r="40"/></clipPath>
  </defs>
  <!-- 毛糸玉本体 -->
  <circle cx="60" cy="62" r="40" fill="url(#tw-yarn-grad)"/>
  <!-- 巻かれた糸（クロスする曲線） -->
  <g clip-path="url(#tw-ball)" fill="none" stroke="#fff" stroke-opacity=".6" stroke-width="3" stroke-linecap="round">
    <path d="M18 50 C40 30, 80 30, 102 50"/>
    <path d="M14 66 C40 44, 80 44, 106 66"/>
    <path d="M16 82 C42 60, 78 60, 104 82"/>
    <path d="M30 22 C48 50, 48 78, 36 104"/>
    <path d="M58 18 C76 48, 76 80, 64 106"/>
    <path d="M86 24 C100 52, 96 80, 88 100"/>
  </g>
  <circle cx="60" cy="62" r="40" fill="none" stroke="#fff" stroke-opacity=".95" stroke-width="2.5"/>
  <!-- ほどけた糸のループ（かわいさのアクセント） -->
  <path d="M84 30 C104 16, 116 30, 104 40 C96 46, 92 36, 100 33"
        fill="none" stroke="#ff8f73" stroke-width="3.6" stroke-linecap="round"/>
</svg>
